    <style>
        .resume-viewer-page {
            margin: 0;
            min-height: 100vh;
            background: var(--bg-primary, #f6f6f4);
        }
        .resume-viewer-toolbar {
            position: sticky;
            top: 0;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            padding: 12px 20px;
            background: var(--bg-primary, #f6f6f4);
            border-bottom: 1px solid var(--footer-border, rgba(0, 0, 0, 0.1));
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .resume-viewer-toolbar a {
            color: var(--text-secondary, #525252);
            font-size: 14px;
            text-decoration: none;
            transition: color 0.2s ease;
        }
        .resume-viewer-toolbar a:hover {
            color: var(--text-heading, #0a0a0a);
        }
        .resume-viewer-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-heading, #0a0a0a);
        }
        .resume-viewer-pages {
            padding: 24px 16px 64px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }
        .resume-viewer-pages canvas {
            max-width: 100%;
            height: auto;
            display: block;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.12);
            background: #fff;
        }
        .resume-viewer-error {
            max-width: 520px;
            margin: 48px auto;
            padding: 0 24px;
            font-family: ui-sans-serif, system-ui, sans-serif;
            font-size: 15px;
            color: var(--text-secondary, #525252);
            text-align: center;
        }
        .resume-viewer-error a {
            color: #da3400;
        }
    </style>

<body class="resume-viewer-page">
    <header class="resume-viewer-toolbar">
        <a href="index.html">← Home</a>
        <span class="resume-viewer-title">Resume</span>
        <a href="resume.pdf" target="_blank" rel="noopener" id="resume-download" onclick="posthog.capture('clicked_resume_download_pdf', {}, { send_instantly: true })">Download PDF</a>
    </header>
    <div id="pdf-pages" class="resume-viewer-pages" aria-live="polite"></div>
    <div id="pdf-error" class="resume-viewer-error" hidden></div>
    <script>
        (function () {
            var pdfjsLib = window.pdfjsLib;
            if (!pdfjsLib) {
                document.getElementById('pdf-error').hidden = false;
                document.getElementById('pdf-error').innerHTML =
                    'Could not load the PDF viewer. <a href="resume.pdf">Open the PDF directly</a>.';
                return;
            }
            pdfjsLib.GlobalWorkerOptions.workerSrc =
                'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

            var container = document.getElementById('pdf-pages');
            var errorEl = document.getElementById('pdf-error');

            function showError(msg) {
                container.innerHTML = '';
                errorEl.hidden = false;
                errorEl.innerHTML =
                    msg + ' <a href="resume.pdf" target="_blank" rel="noopener">Open resume.pdf</a>.';
            }

            function scaleForPage(viewportWidth) {
                var maxW = Math.max(320, window.innerWidth - 32);
                return Math.min(1.75, maxW / viewportWidth);
            }

            // Fetch PDF in this document's context; passing a URL into getDocument()
            // can fail when the PDF.js worker is loaded from a CDN (cross-origin fetch).
            fetch('resume.pdf')
                .then(function (res) {
                    if (!res.ok) throw new Error('bad status');
                    return res.arrayBuffer();
                })
                .then(function (buf) {
                    return pdfjsLib.getDocument({ data: buf }).promise;
                })
                .then(function (pdf) {
                    var chain = Promise.resolve();
                    for (var i = 1; i <= pdf.numPages; i++) {
                        (function (pageNum) {
                            chain = chain.then(function () {
                                return pdf.getPage(pageNum).then(function (page) {
                                    var base = page.getViewport({ scale: 1 });
                                    var scale = scaleForPage(base.width);
                                    var viewport = page.getViewport({ scale: scale });
                                    var canvas = document.createElement('canvas');
                                    var ctx = canvas.getContext('2d', { alpha: false });
                                    canvas.width = viewport.width;
                                    canvas.height = viewport.height;
                                    return page
                                        .render({ canvasContext: ctx, viewport: viewport })
                                        .promise.then(function () {
                                            container.appendChild(canvas);
                                        });
                                });
                            });
                        })(i);
                    }
                    return chain.then(function () {
                        if (window.posthog) {
                            posthog.capture(
                                'resume_viewer_rendered',
                                { pages: pdf.numPages },
                                { send_instantly: true }
                            );
                        }
                    });
                })
                .catch(function () {
                    showError('Could not load your resume file.');
                });
        })();
    </script>
</body>
